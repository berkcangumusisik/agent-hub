<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" role="img" aria-label="agent-hub architecture diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0b0f"/><stop offset="1" stop-color="#101218"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8ab4ff"/><stop offset="0.5" stop-color="#8ab4ff"/><stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8ab4ff"/>
    </marker>
  </defs>
  <style>
    .t  { font-family: ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif; fill:#f2f2f7; }
    .m  { font-family: ui-monospace,SFMono-Regular,Menlo,monospace; }
    .mut{ fill:#9aa0ad; }
  </style>

  <rect width="1000" height="620" rx="18" fill="url(#bg)"/>

  <!-- TOP: plugin -->
  <rect x="220" y="34" width="560" height="150" rx="14" fill="#0e0f14" stroke="url(#accent)" stroke-width="2"/>
  <text x="500" y="66" text-anchor="middle" class="t" font-size="20" font-weight="800">super-team plugin</text>
  <text x="500" y="88" text-anchor="middle" class="t mut m" font-size="12">installed once · available in every project</text>

  <!-- agent chips -->
  <g font-size="11.5" class="t m" text-anchor="middle">
    <g>
      <rect x="244" y="104" width="118" height="26" rx="13" fill="#0a0b0f" stroke="#8ab4ff"/><text x="303" y="121">tech-lead</text>
      <rect x="372" y="104" width="118" height="26" rx="13" fill="#0a0b0f" stroke="#8ab4ff"/><text x="431" y="121">architect</text>
      <rect x="500" y="104" width="118" height="26" rx="13" fill="#0a0b0f" stroke="#8ab4ff"/><text x="559" y="121">backend</text>
      <rect x="628" y="104" width="118" height="26" rx="13" fill="#0a0b0f" stroke="#8ab4ff"/><text x="687" y="121">frontend</text>
    </g>
    <g>
      <rect x="244" y="138" width="96" height="26" rx="13" fill="#0a0b0f" stroke="#8ab4ff"/><text x="292" y="155">mobile</text>
      <rect x="350" y="138" width="96" height="26" rx="13" fill="#0a0b0f" stroke="#8ab4ff"/><text x="398" y="155">devops</text>
      <rect x="456" y="138" width="96" height="26" rx="13" fill="#0a0b0f" stroke="#a78bfa"/><text x="504" y="155">reviewer</text>
      <rect x="562" y="138" width="78" height="26" rx="13" fill="#0a0b0f" stroke="#8ab4ff"/><text x="601" y="155">qa</text>
      <rect x="650" y="138" width="96" height="26" rx="13" fill="#0a0b0f" stroke="#a78bfa"/><text x="698" y="155">security</text>
    </g>
  </g>

  <!-- connectors plugin -> projects -->
  <g stroke="#1d1f26" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M340 184 C 280 250, 180 270, 165 318"/>
    <path d="M500 184 L500 318"/>
    <path d="M660 184 C 720 250, 820 270, 835 318"/>
  </g>
  <text x="520" y="250" class="t mut m" font-size="12">each agent reads the project profile before acting →</text>

  <!-- BOTTOM: three projects -->
  <g class="t">
    <!-- backend service -->
    <rect x="40" y="324" width="270" height="252" rx="14" fill="#0e0f14" stroke="#1d1f26"/>
    <text x="62" y="354" font-size="16" font-weight="700">service-api</text>
    <rect x="62" y="368" width="120" height="22" rx="11" fill="#0a0b0f" stroke="#8ab4ff"/><text x="72" y="383" font-size="11" class="m">NestJS · Postgres</text>
    <text x="62" y="416" font-size="12" class="mut m">.claude/</text>
    <text x="62" y="438" font-size="12" class="m" fill="#a78bfa">  agent-hub/profile.yml</text>
    <text x="62" y="460" font-size="12" class="m" fill="#8ab4ff">  CLAUDE.md</text>
    <text x="62" y="500" font-size="11.5" class="mut">active: backend, reviewer,</text>
    <text x="62" y="518" font-size="11.5" class="mut">security, qa, architect</text>

    <!-- web app -->
    <rect x="365" y="324" width="270" height="252" rx="14" fill="#0e0f14" stroke="#1d1f26"/>
    <text x="387" y="354" font-size="16" font-weight="700">web-app</text>
    <rect x="387" y="368" width="120" height="22" rx="11" fill="#0a0b0f" stroke="#8ab4ff"/><text x="397" y="383" font-size="11" class="m">Next.js · web</text>
    <text x="387" y="416" font-size="12" class="mut m">.claude/</text>
    <text x="387" y="438" font-size="12" class="m" fill="#a78bfa">  agent-hub/profile.yml</text>
    <text x="387" y="460" font-size="12" class="m" fill="#8ab4ff">  CLAUDE.md</text>
    <text x="387" y="500" font-size="11.5" class="mut">active: frontend, reviewer,</text>
    <text x="387" y="518" font-size="11.5" class="mut">qa, architect</text>

    <!-- admin panel -->
    <rect x="690" y="324" width="270" height="252" rx="14" fill="#0e0f14" stroke="#1d1f26"/>
    <text x="712" y="354" font-size="16" font-weight="700">admin-panel</text>
    <rect x="712" y="368" width="120" height="22" rx="11" fill="#0a0b0f" stroke="#a78bfa"/><text x="722" y="383" font-size="11" class="m">React · Vite</text>
    <text x="712" y="416" font-size="12" class="mut m">.claude/</text>
    <text x="712" y="438" font-size="12" class="m" fill="#a78bfa">  agent-hub/profile.yml</text>
    <text x="712" y="460" font-size="12" class="m" fill="#8ab4ff">  CLAUDE.md</text>
    <text x="712" y="500" font-size="11.5" class="mut">active: frontend, reviewer,</text>
    <text x="712" y="518" font-size="11.5" class="mut">tech-writer</text>
  </g>

  <text x="500" y="600" text-anchor="middle" class="t mut m" font-size="12">same team · different profile · auto-specialized per project</text>
</svg>
