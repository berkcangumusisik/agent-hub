<svg xmlns="http://www.w3.org/2000/svg" width="780" height="470" viewBox="0 0 780 470" role="img" aria-label="agent-hub demo: running /onboard on the repo-seatbelt project">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#11161d"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size:15px; }
    .p   { fill:#22d3ee; }   /* prompt */
    .c   { fill:#e6edf3; }   /* command / white */
    .m   { fill:#8b949e; }   /* muted */
    .g   { fill:#3fb950; }   /* success */
    .v   { fill:#818cf8; }   /* accent */
    .y   { fill:#d29922; }   /* spinner */
    .ln  { opacity:0; }
    @keyframes r1  {0%,1%{opacity:0} 3%,94%{opacity:1} 98%,100%{opacity:0}}
    @keyframes r2  {0%,6%{opacity:0} 8%,94%{opacity:1} 98%,100%{opacity:0}}
    @keyframes r3  {0%,11%{opacity:0} 13%,94%{opacity:1} 98%,100%{opacity:0}}
    @keyframes r4  {0%,17%{opacity:0} 19%,94%{opacity:1} 98%,100%{opacity:0}}
    @keyframes r5  {0%,22%{opacity:0} 24%,94%{opacity:1} 98%,100%{opacity:0}}
    @keyframes r6  {0%,28%{opacity:0} 30%,94%{opacity:1} 98%,100%{opacity:0}}
    @keyframes r7  {0%,36%{opacity:0} 38%,94%{opacity:1} 98%,100%{opacity:0}}
    @keyframes r8  {0%,44%{opacity:0} 46%,94%{opacity:1} 98%,100%{opacity:0}}
    @keyframes r9  {0%,52%{opacity:0} 54%,94%{opacity:1} 98%,100%{opacity:0}}
    @keyframes r10 {0%,60%{opacity:0} 62%,94%{opacity:1} 98%,100%{opacity:0}}
    @keyframes r11 {0%,68%{opacity:0} 70%,94%{opacity:1} 98%,100%{opacity:0}}
    @keyframes r12 {0%,76%{opacity:0} 78%,94%{opacity:1} 98%,100%{opacity:0}}
    @keyframes blink {0%,49%{opacity:1} 50%,100%{opacity:0}}
    .l1{animation:r1 14s infinite}   .l2{animation:r2 14s infinite}
    .l3{animation:r3 14s infinite}   .l4{animation:r4 14s infinite}
    .l5{animation:r5 14s infinite}   .l6{animation:r6 14s infinite}
    .l7{animation:r7 14s infinite}   .l8{animation:r8 14s infinite}
    .l9{animation:r9 14s infinite}   .l10{animation:r10 14s infinite}
    .l11{animation:r11 14s infinite} .l12{animation:r12 14s infinite}
    .cursor{animation:blink 1s steps(1) infinite}
  </style>

  <!-- window -->
  <rect width="780" height="470" rx="14" fill="url(#bg)" stroke="#30363d"/>
  <rect width="780" height="40" rx="14" fill="#161b22"/>
  <rect y="26" width="780" height="14" fill="#161b22"/>
  <circle cx="24" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="46" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="68" cy="20" r="6" fill="#27c93f"/>
  <text x="390" y="25" text-anchor="middle" class="m" font-size="13">repo-seatbelt — claude code · agent-hub</text>

  <!-- transcript -->
  <g>
    <text x="22" y="78"  class="ln l1"><tspan class="p">❯ </tspan><tspan class="c">/onboard</tspan></text>
    <text x="22" y="106" class="ln l2"><tspan class="y">  ⠿</tspan><tspan class="m"> scanning repository…</tspan></text>
    <text x="22" y="134" class="ln l3"><tspan class="g">  ✓</tspan><tspan class="c"> Detected: </tspan><tspan class="v">TypeScript</tspan><tspan class="m"> · Node CLI (commander) · npm</tspan></text>
    <text x="22" y="162" class="ln l4"><tspan class="g">  ✓</tspan><tspan class="m"> wrote </tspan><tspan class="c">.claude/agent-hub/profile.yml</tspan></text>
    <text x="22" y="190" class="ln l5"><tspan class="g">  ✓</tspan><tspan class="m"> wrote </tspan><tspan class="c">.claude/CLAUDE.md</tspan></text>
    <text x="22" y="218" class="ln l6"><tspan class="m">  team: </tspan><tspan class="v">tech-lead architect backend-engineer code-reviewer qa</tspan></text>

    <text x="22" y="260" class="ln l7"><tspan class="p">❯ </tspan><tspan class="c">add a --json flag to the scan command</tspan></text>
    <text x="22" y="288" class="ln l8"><tspan class="v">  tech-lead</tspan><tspan class="m"> reads the profile → routing to specialists</tspan></text>
    <text x="40" y="316" class="ln l9"><tspan class="m">├─ </tspan><tspan class="v">architect</tspan><tspan class="m">       design the flag + JSON output formatter</tspan></text>
    <text x="40" y="344" class="ln l10"><tspan class="m">├─ </tspan><tspan class="v">backend-engineer</tspan><tspan class="m"> implement it with commander</tspan></text>
    <text x="40" y="372" class="ln l11"><tspan class="m">├─ </tspan><tspan class="v">qa-tester</tspan><tspan class="m">       tests for --json output</tspan></text>
    <text x="40" y="400" class="ln l12"><tspan class="m">└─ </tspan><tspan class="v">code-reviewer</tspan><tspan class="g">   ✓ </tspan><tspan class="c">looks good — shipped</tspan></text>

    <g class="cursor"><rect x="22" y="430" width="9" height="17" fill="#22d3ee"/></g>
  </g>
</svg>
